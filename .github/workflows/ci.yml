name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy action/ shared/ || true   # warnings only for now; tighten later

      - name: Pytest
        run: pytest -v --cov=action --cov=shared --cov-report=term-missing

  smoke-test-action:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Run the action against pass-repo fixture
        if: ${{ hashFiles('tests/fixtures/pass-repo/main.tf') != '' }}
        uses: ./
        with:
          root_paths: tests/fixtures/pass-repo
          post_check_run: 'false'
